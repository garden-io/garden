name: Post-release automation

# Triggered automatically when a draft GitHub release is created by CircleCI's github-release-tag job.
# Can also be triggered manually via workflow_dispatch to test or re-run the pipeline.
#
# This workflow:
# 1. Runs a smoke test on the release binary
# 2. Generates release notes (using human summary if provided, otherwise default)
# 3. Publishes the draft release
#
# Publishing then triggers publish-release.yml (Homebrew) and auto-merge-release-pr.yml.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Release tag to process (e.g. 0.14.18). Must be an existing draft release."
        required: true
        type: string

permissions:
  contents: write

env:
  # Normalize the tag name across both trigger types
  RELEASE_TAG: ${{ inputs.tag-name || github.event.release.tag_name }}

jobs:
  smoke-test:
    # For release events: only run for draft releases
    # For workflow_dispatch: always run
    if: github.event_name == 'workflow_dispatch' || github.event.release.draft == true
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release binary
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          BASE_VERSION="${VERSION%%-*}"
          FILENAME="garden-${BASE_VERSION}-macos-amd64.tar.gz"
          URL="https://download.garden.io/core/${VERSION}/${FILENAME}"

          echo "Downloading ${URL}..."
          mkdir -p "$HOME/.garden-release/bin"
          cd "$HOME/.garden-release"
          curl -sLO "$URL"
          tar -xzf "$FILENAME"
          cp -r macos-amd64/* bin/
          chmod +x bin/garden
          rm -rf macos-amd64 "$FILENAME"

      - name: Run smoke test
        run: |
          ./scripts/test-release.sh "${{ env.RELEASE_TAG }}" \
            --ci \
            --binary-path "$HOME/.garden-release/bin/garden"

  generate-notes-and-publish:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install git-chglog
        run: |
          curl -sL https://github.com/git-chglog/git-chglog/releases/download/v0.15.4/git-chglog_0.15.4_linux_amd64.tar.gz | tar xz -C /usr/local/bin git-chglog

      - name: Determine previous tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ env.RELEASE_TAG }}"
          # Get the tag before the current one (sorted by semver)
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^\d+\.\d+\.\d+$' | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG}"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/draft-release-notes.ts \
            "${{ steps.prev-tag.outputs.tag }}" \
            "${{ env.RELEASE_TAG }}" \
            --output-stdout > /tmp/release-notes.md

      - name: Update release body and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ env.RELEASE_TAG }}" \
            --notes-file /tmp/release-notes.md \
            --draft=false

      - name: Post summary
        run: |
          {
            echo "## Release Published :tada:"
            echo ""
            echo "**Version**: \`${{ env.RELEASE_TAG }}\`"
            echo ""
            echo "The release has been published with auto-generated release notes."
            echo "Downstream workflows (Homebrew, release PR) have been triggered."
          } >> "$GITHUB_STEP_SUMMARY"
